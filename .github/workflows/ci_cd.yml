name: LLMOps CI/CD Pipeline

# ============================================================
# GITHUB ACTIONS CI/CD FOR LLM SYSTEMS
# ============================================================
#
# WHAT THIS DOES:
#   1. On every PR → run unit tests + linting
#   2. On merge to main → run full RAG evaluation
#   3. If RAGAS metrics pass quality gate → promote model
#   4. Run weekly drift detection check
#
# CV REFERENCE:
#   "Engineered automated CI/CD pipeline for model deployment
#    (GitHub Actions + MLflow + Docker), reducing release cycle
#    from 2 weeks to 2 days — an 85% improvement"
#
# INTERVIEW TALKING POINTS:
#   Q: What is CI/CD for ML?
#   A: Continuous Integration = automatically test every code change.
#      Continuous Deployment = automatically deploy if tests pass.
#      For ML: also includes model evaluation as a quality gate.
#
#   Q: What is a quality gate?
#   A: A threshold that must be met before deployment proceeds.
#      E.g., RAGAS faithfulness >= 0.80. If it fails, deployment stops
#      and an alert is sent. Prevents bad models reaching production.
# ============================================================

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly drift detection — every Monday at 8am UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Code Quality (runs on every PR)
  # ──────────────────────────────────────────────────────────
  code-quality:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────
  # JOB 2: RAG Evaluation (runs on merge to main)
  # ──────────────────────────────────────────────────────────
  rag-evaluation:
    name: RAG Quality Gate Evaluation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: []

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAG evaluation pipeline
        id: eval
        run: |
          python src/mlops/01_mlflow_tracking.py
          # In production this writes metrics to a file:
          # echo "faithfulness=0.87" >> $GITHUB_OUTPUT
          # echo "overall=0.84" >> $GITHUB_OUTPUT
          echo "quality_gate_passed=true" >> $GITHUB_OUTPUT

      - name: Check quality gate
        run: |
          if [ "${{ steps.eval.outputs.quality_gate_passed }}" == "false" ]; then
            echo "❌ Quality gate FAILED — faithfulness below threshold"
            echo "Model will NOT be promoted to production"
            exit 1
          fi
          echo "✅ Quality gate PASSED — promoting model"

      - name: Promote model to staging (if quality gate passed)
        if: steps.eval.outputs.quality_gate_passed == 'true'
        run: |
          python -c "
          print('Model promoted to Staging in MLflow registry')
          print('Next: integration tests will promote to Production')
          # In production:
          # import mlflow
          # client = mlflow.tracking.MlflowClient()
          # client.transition_model_version_stage(name='rag-pipeline', version=latest_version, stage='Staging')
          "

      - name: Notify Slack on failure
        if: failure()
        run: |
          echo "Would send Slack alert: RAG quality gate failed on commit ${{ github.sha }}"
          # In production:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-type: application/json' \
          #   --data '{"text":"❌ RAG quality gate failed: ${{ github.sha }}"}'

  # ──────────────────────────────────────────────────────────
  # JOB 3: Drift Detection (runs weekly)
  # ──────────────────────────────────────────────────────────
  drift-detection:
    name: Weekly Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drift detection
        id: drift
        run: |
          python src/monitoring/01_drift_detection.py
          # In production writes: echo "max_psi=0.15" >> $GITHUB_OUTPUT
          #                        echo "retrain_required=false" >> $GITHUB_OUTPUT
          echo "retrain_required=false" >> $GITHUB_OUTPUT

      - name: Trigger retraining if drift detected
        if: steps.drift.outputs.retrain_required == 'true'
        run: |
          echo "🚨 Significant drift detected — triggering retraining pipeline"
          # In production: trigger a separate retraining workflow
          # gh workflow run retrain.yml

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: drift_report.json
          retention-days: 30

  # ──────────────────────────────────────────────────────────
  # JOB 4: Docker Build & Push (after quality gate passes)
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [rag-evaluation]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          echo "Building production Docker image..."
          # docker build -t rag-service:${{ github.sha }} .
          # docker tag rag-service:${{ github.sha }} rag-service:latest

      - name: Push to registry
        run: |
          echo "Pushing image to container registry..."
          # docker push rag-service:${{ github.sha }}
          # In production: push to ECR/GCR/ACR

      - name: Deploy to staging
        run: |
          echo "Deploying to Kubernetes staging namespace..."
          # kubectl set image deployment/rag-service rag-service=rag-service:${{ github.sha }} -n staging
          # kubectl rollout status deployment/rag-service -n staging --timeout=5m
